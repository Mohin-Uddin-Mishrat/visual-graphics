services:
  api:
    build:
      context: .
    image: ${IMAGE_NAME:-visual-graphics-backend}:latest
    container_name: ${COMPOSE_PROJECT_NAME:-visual-graphics}_api
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${CONTAINER_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-visual_graphics}}
    ports:
      - '127.0.0.1:${API_PORT:-3001}:${CONTAINER_PORT:-3000}'
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database...';
        sleep 5;
        npm run db:deploy;
        echo 'Starting API...';
        npm run start:prod
      "
    volumes:
      - uploads-data:/app/uploads

  db:
    image: postgres:17
    container_name: ${COMPOSE_PROJECT_NAME:-visual-graphics}_db
    restart: always
    user: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-visual_graphics}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:${DB_PORT:-5435}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-visual_graphics}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  uploads-data:

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-visual-graphics}_network
